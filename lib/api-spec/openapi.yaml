        amount:
          type: number
        currency:
          type: string
          default: BRL
        customerId:
          type: string
        customerEmail:
          type: string
        plan:
          type: string
        description:
          type: string
        timestamp:
          type: string
          format: date-time
      required: [type, amount]

    PlanRevenue:
      type: object
      properties:
        plan:
          type: string
        customers:
          type: integer
        mrr:
          type: number
        percentage:
