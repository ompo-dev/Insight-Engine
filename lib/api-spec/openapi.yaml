          type: string
        projectId:
          type: string
        externalId:
          type: string
        email:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [active, churned, trialing]
        plan:
          type: string
        mrr:
          type: number
        ltv:
          type: number
        country:
          type: string
        createdAt:
          type: string
          format: date-time
        churned_at:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
      required: [id, projectId, email, status, createdAt]

    CustomerDetail:
      type: object
      properties:
        customer:
          $ref: "#/components/schemas/Customer"
        revenueHistory:
          type: array
          items:
