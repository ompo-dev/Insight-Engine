openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: Lynx Analytics — Plataforma para micro-SaaS brasileiros
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: projects
  - name: events
  - name: sessions
  - name: analytics
  - name: experiments
  - name: logs
  - name: requests
  - name: datastore
  - name: funnels
  - name: dashboards
  - name: revenue
    description: SaaS revenue metrics (MRR, ARR, churn, LTV)
  - name: customers
    description: Customer management with revenue data
  - name: featureFlags
    description: Feature flags management
  - name: abacatepay
    description: Abacate Pay payment integration
  - name: insights
    description: AI-powered growth insights

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{projectId}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project by ID
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /projects/{projectId}/events:
    post:
      operationId: ingestEvent
      tags: [events]
      summary: Ingest one or more events
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestEventRequest"
      responses:
        "201":
          description: Events ingested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestEventResponse"
    get:
      operationId: listEvents
      tags: [events]
      summary: List events for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: eventName
          in: query
          schema:
            type: string
        - name: sessionId
          in: query
          schema:
            type: string
        - name: userId
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Events list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventListResponse"

  /projects/{projectId}/analytics/overview:
    get:
      operationId: getAnalyticsOverview
      tags: [analytics]
      summary: Get analytics overview for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Analytics overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsOverview"

  /projects/{projectId}/analytics/events:
    get:
      operationId: getEventAnalytics
      tags: [analytics]
      summary: Get event breakdown analytics
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: groupBy
          in: query
          schema:
            type: string
            enum: [day, hour, week]
            default: day
      responses:
        "200":
          description: Event analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventAnalytics"

  /projects/{projectId}/analytics/pageviews:
    get:
      operationId: getPageviewAnalytics
      tags: [analytics]
      summary: Get pageview analytics by path
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Pageview analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageviewAnalytics"

  /projects/{projectId}/sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List sessions for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Sessions list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionListResponse"

  /projects/{projectId}/sessions/{sessionId}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get session details with event flow
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetail"

  /projects/{projectId}/experiments:
    get:
      operationId: listExperiments
      tags: [experiments]
      summary: List experiments
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of experiments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Experiment"
    post:
      operationId: createExperiment
      tags: [experiments]
      summary: Create an A/B experiment
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExperimentRequest"
      responses:
        "201":
          description: Created experiment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Experiment"

  /projects/{projectId}/experiments/{experimentId}:
    get:
      operationId: getExperiment
      tags: [experiments]
      summary: Get experiment details with results
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: experimentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Experiment with results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExperimentDetail"
    patch:
      operationId: updateExperiment
      tags: [experiments]
      summary: Update experiment status
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: experimentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateExperimentRequest"
      responses:
        "200":
          description: Updated experiment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Experiment"

  /projects/{projectId}/logs:
    get:
      operationId: listLogs
      tags: [logs]
      summary: List application logs
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: level
          in: query
          schema:
            type: string
            enum: [debug, info, warn, error]
        - name: service
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Logs list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogListResponse"
    post:
      operationId: ingestLog
      tags: [logs]
      summary: Ingest log entries
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestLogRequest"
      responses:
        "201":
          description: Logs ingested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestLogResponse"

  /projects/{projectId}/requests:
    get:
      operationId: listRequests
      tags: [requests]
      summary: List HTTP requests
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: method
          in: query
          schema:
            type: string
        - name: statusCode
          in: query
          schema:
            type: integer
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Requests list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestListResponse"
    post:
      operationId: ingestRequest
      tags: [requests]
      summary: Ingest HTTP request data
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestRequestRequest"
      responses:
        "201":
          description: Request ingested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestRecord"

  /projects/{projectId}/datastore:
    get:
      operationId: listDatastoreCollections
      tags: [datastore]
      summary: List datastore collections
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Collections list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DatastoreCollection"

  /projects/{projectId}/datastore/{collection}:
    get:
      operationId: queryDatastore
      tags: [datastore]
      summary: Query a datastore collection
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: collection
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Datastore records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatastoreQueryResponse"
    post:
      operationId: insertDatastoreRecord
      tags: [datastore]
      summary: Insert a record into a collection
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: collection
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InsertDatastoreRequest"
      responses:
        "201":
          description: Inserted record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatastoreRecord"

  /projects/{projectId}/funnels:
    get:
      operationId: listFunnels
      tags: [funnels]
      summary: List funnels for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Funnels list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Funnel"
    post:
      operationId: createFunnel
      tags: [funnels]
      summary: Create a funnel
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFunnelRequest"
      responses:
        "201":
          description: Created funnel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Funnel"

  /projects/{projectId}/funnels/{funnelId}/results:
    get:
      operationId: getFunnelResults
      tags: [funnels]
      summary: Get funnel results and conversion rates
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: funnelId
          in: path
          required: true
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Funnel results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FunnelResults"

  /projects/{projectId}/dashboards:
    get:
      operationId: listDashboards
      tags: [dashboards]
      summary: List dashboards for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Dashboards list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Dashboard"
    post:
      operationId: createDashboard
      tags: [dashboards]
      summary: Create a dashboard
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDashboardRequest"
      responses:
        "201":
          description: Created dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dashboard"

  # ─── REVENUE & SAAS METRICS ───────────────────────────────────────────────

  /projects/{projectId}/revenue/metrics:
    get:
      operationId: getRevenueMetrics
      tags: [revenue]
      summary: Get SaaS revenue metrics (MRR, ARR, churn, LTV, ARPU, CAC)
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Revenue metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueMetrics"

  /projects/{projectId}/revenue/timeline:
    get:
      operationId: getRevenueTimeline
      tags: [revenue]
      summary: Get MRR timeline for charting
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Revenue timeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueTimeline"

  /projects/{projectId}/revenue/events:
    get:
      operationId: listRevenueEvents
      tags: [revenue]
      summary: List raw revenue events (payments, cancellations, upgrades)
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [payment, cancellation, upgrade, downgrade, refund, new_subscription]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Revenue events list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueEventListResponse"
    post:
      operationId: createRevenueEvent
      tags: [revenue]
      summary: Manually record a revenue event
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRevenueEventRequest"
      responses:
        "201":
          description: Revenue event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueEvent"

  /projects/{projectId}/revenue/plans:
    get:
      operationId: getRevenuePlans
      tags: [revenue]
      summary: Revenue breakdown by plan
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Revenue by plan
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlanRevenue"

  # ─── CUSTOMERS ────────────────────────────────────────────────────────────

  /projects/{projectId}/customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List customers with revenue data
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, churned, trialing]
        - name: plan
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Customers list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerListResponse"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create or upsert a customer
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerRequest"
      responses:
        "201":
          description: Created customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /projects/{projectId}/customers/{customerId}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get customer details with revenue history
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: customerId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Customer details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerDetail"

  # ─── FEATURE FLAGS ────────────────────────────────────────────────────────

  /projects/{projectId}/feature-flags:
    get:
      operationId: listFeatureFlags
      tags: [featureFlags]
      summary: List feature flags
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Feature flags list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeatureFlag"
    post:
      operationId: createFeatureFlag
      tags: [featureFlags]
      summary: Create a feature flag
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFeatureFlagRequest"
      responses:
        "201":
          description: Created feature flag
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeatureFlag"

  /projects/{projectId}/feature-flags/{flagId}:
    patch:
      operationId: updateFeatureFlag
      tags: [featureFlags]
      summary: Update a feature flag
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: flagId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFeatureFlagRequest"
      responses:
        "200":
          description: Updated feature flag
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeatureFlag"
    delete:
      operationId: deleteFeatureFlag
      tags: [featureFlags]
      summary: Delete a feature flag
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: flagId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /projects/{projectId}/feature-flags/evaluate:
    post:
      operationId: evaluateFeatureFlags
      tags: [featureFlags]
      summary: Evaluate feature flags for a user context
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluateFlagsRequest"
      responses:
        "200":
          description: Evaluated flags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluateFlagsResponse"

  # ─── ABACATE PAY INTEGRATION ──────────────────────────────────────────────

  /projects/{projectId}/abacatepay/connect:
    post:
      operationId: connectAbacatePay
      tags: [abacatepay]
      summary: Connect Abacate Pay integration
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectAbacatePayRequest"
      responses:
        "200":
          description: Connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AbacatePayStatus"

  /projects/{projectId}/abacatepay/status:
    get:
      operationId: getAbacatePayStatus
      tags: [abacatepay]
      summary: Get Abacate Pay connection status
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Connection status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AbacatePayStatus"

  /projects/{projectId}/abacatepay/webhook:
    post:
      operationId: abacatePayWebhook
      tags: [abacatepay]
      summary: Receive Abacate Pay webhooks
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]

  /projects/{projectId}/abacatepay/sync:
    post:
      operationId: syncAbacatePay
      tags: [abacatepay]
      summary: Sync data from Abacate Pay API
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AbacatePaySyncResult"

  # ─── AI INSIGHTS ──────────────────────────────────────────────────────────

  /projects/{projectId}/insights:
    get:
      operationId: getInsights
      tags: [insights]
      summary: Get AI-powered growth insights
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Growth insights
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsightsResponse"

  /projects/{projectId}/insights/alerts:
    get:
      operationId: getAlerts
      tags: [insights]
      summary: Get active alerts and anomaly detections
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Alerts list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

components:
