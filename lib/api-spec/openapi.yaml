        currency:
          type: string
          default: BRL
        customerId:
          type: string
        customerEmail:
          type: string
        plan:
          type: string
        description:
          type: string
        externalId:
          type: string
        source:
          type: string
          enum: [abacatepay, manual, api]
        timestamp:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
      required: [id, projectId, type, amount, currency, timestamp, source]

