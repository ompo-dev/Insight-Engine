    # ─── FEATURE FLAG SCHEMAS ───────────────────────────────────────────────

    FeatureFlag:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
        key:
          type: string
        name:
          type: string
        description:
          type: string
        enabled:
          type: boolean
        rolloutPercentage:
          type: number
          description: 0-100
        targetingRules:
          type: array
          items:
            $ref: "#/components/schemas/FlagTargetingRule"
        variants:
          type: array
          items:
            $ref: "#/components/schemas/FlagVariant"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, projectId, key, name, enabled, rolloutPercentage, createdAt, updatedAt]

    FlagTargetingRule:
      type: object
      properties:
        type:
          type: string
          enum: [user_id, plan, country, property]
        operator:
          type: string
          enum: [in, not_in, equals, contains]
        values:
          type: array
          items:
            type: string
        property:
          type: string
      required: [type, operator, values]

    FlagVariant:
      type: object
      properties:
        key:
          type: string
        name:
          type: string
        weight:
          type: number
      required: [key, name, weight]

    CreateFeatureFlagRequest:
      type: object
      properties:
        key:
          type: string
        name:
          type: string
        description:
          type: string
        enabled:
          type: boolean
          default: false
        rolloutPercentage:
          type: number
          default: 0
        targetingRules:
          type: array
          items:
            $ref: "#/components/schemas/FlagTargetingRule"
        variants:
          type: array
          items:
            $ref: "#/components/schemas/FlagVariant"
      required: [key, name]

    UpdateFeatureFlagRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        enabled:
          type: boolean
        rolloutPercentage:
          type: number
        targetingRules:
          type: array
          items:
            $ref: "#/components/schemas/FlagTargetingRule"

    EvaluateFlagsRequest:
      type: object
      properties:
        userId:
          type: string
        plan:
          type: string
        country:
          type: string
        properties:
          type: object
          additionalProperties: true
      required: [userId]

    EvaluateFlagsResponse:
      type: object
      properties:
        flags:
          type: object
          additionalProperties: true
      required: [flags]

    # ─── ABACATE PAY SCHEMAS ────────────────────────────────────────────────

    ConnectAbacatePayRequest:
      type: object
      properties:
        apiKey:
          type: string
        webhookSecret:
          type: string
      required: [apiKey]

    AbacatePayStatus:
      type: object
      properties:
        connected:
          type: boolean
        lastSyncAt:
          type: string
          format: date-time
        totalSynced:
          type: integer
      required: [connected]

    AbacatePaySyncResult:
      type: object
      properties:
        customersImported:
          type: integer
        paymentsImported:
          type: integer
        errors:
          type: integer
      required: [customersImported, paymentsImported, errors]

    # ─── INSIGHTS SCHEMAS ───────────────────────────────────────────────────

    InsightsResponse:
      type: object
      properties:
        insights:
          type: array
          items:
            $ref: "#/components/schemas/Insight"
        generatedAt:
          type: string
          format: date-time
      required: [insights, generatedAt]

    Insight:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [growth, churn, engagement, revenue, product, benchmark]
        severity:
          type: string
          enum: [positive, neutral, warning, critical]
        title:
          type: string
        description:
          type: string
        metric:
          type: string
        value:
          type: number
        recommendation:
          type: string
      required: [id, type, severity, title, description]

    Alert:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [churn_spike, revenue_drop, error_spike, low_conversion, high_bounce]
        severity:
          type: string
          enum: [info, warning, critical]
        title:
          type: string
        description:
          type: string
        value:
          type: number
        threshold:
          type: number
        createdAt:
          type: string
          format: date-time
      required: [id, type, severity, title, description, createdAt]
